[docker_context]
symbol = "󰡨 "
style = "bg:gray"
format = '[[ $symbol $context ](fg:cyan bg:gray)]($style)'

[kubernetes]
disabled = false
style = "bg:gray"
format = '[[ $symbol$context( \($namespace\)) ](fg:cyan bg:gray)]($style)'

[terraform]
symbol = "󱁢 "
style = "bg:gray"
format = '[[ $symbol $workspace ](fg:cyan bg:gray)]($style)'

[gcloud]
symbol = "󱇶 "
style = "bg:gray"
format = '[[ $symbol $account(@$domain)(\($region\)) ](fg:cyan bg:gray)]($style)'

[cmd_duration]
min_time = 500
style = "bg:gray"
format = '[[ ⏱ $duration ](fg:text bg:gray)]($style)'
disabled = false

[character]
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'

[line_break]
disabled = false

# --- CENTRALIZED PALETTE ---
[palettes.unified_dark]
background = "#191B20"
highlight = "#3A3D4A"
text = "#C0CAF5"
purple = "#9D7CD8"
green = "#9ECE6A"
blue = "#7AA2F7"
yellow = "#E0AF68"
red = "#BF616A"
cyan = "#7DCFFF"
pink = "#D08770"
orange = "#FF9E64"
surface = "#515669"
gray = "#21252D"
