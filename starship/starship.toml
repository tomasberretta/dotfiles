[docker_context]
symbol = "󰡨 "
style = "bg:border"
format = '[[ $symbol $context ](fg:cyan bg:border)]($style)'

[kubernetes]
disabled = false
style = "bg:border"
format = '[[ $symbol $context( \($namespace\)) ](fg:cyan bg:border)]($style)'

[terraform]
symbol = "󱁢 "
style = "bg:border"
format = '[[ $symbol $workspace ](fg:cyan bg:border)]($style)'

[gcloud]
symbol = "󱇶 "
style = "bg:border"
format = '[[ $symbol $account(@$domain)(\($region\)) ](fg:cyan bg:border)]($style)'

[cmd_duration]
min_time = 500
style = "bg:border"
format = '[[  $duration ](fg:text bg:border)]($style)'
disabled = false

[character]
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'

[line_break]
disabled = false

# --- CENTRALIZED PALETTE ---
# All semantic names reference the active palette. Segment backgrounds use
# teal/blue/surface/highlight/border so they stay distinct across themes.
[palettes.onyx]
background = "#151311"
text       = "#eed3ba"
surface    = "#251e1b"
highlight  = "#4b262f"
border     = "#3a2e2a"
gray       = "#a08d7d"
teal       = "#c28a9a"
blue       = "#9fbde0"
cyan       = "#a8c8c2"
green      = "#b8c47c"
yellow     = "#f0c97d"
orange     = "#eda078"
red        = "#e87462"
purple     = "#c28a9a"
pink       = "#d48a9c"
