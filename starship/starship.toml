"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

# Powerline chain — bg of each segment, separators use prev-fg → next-bg
format = """
[](teal)\
$os\
$hostname\
[](fg:teal bg:blue)\
$directory\
[](fg:blue bg:surface)\
$git_branch\
$git_commit\
$git_status\
[](fg:surface bg:highlight)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$ruby\
$swift\
$dart\
$elixir\
$erlang\
$scala\
$julia\
$lua\
$perl\
$crystal\
$zig\
$nim\
$red\
$fennel\
$vlang\
$ocaml\
$purescript\
$raku\
$solidity\
$dotnet\
$cmake\
$cobol\
[](fg:highlight bg:border)\
$conda\
$docker_context\
$kubernetes\
$terraform\
$gcloud\
$cmd_duration\
[](fg:border)\
$line_break\
$character"""

palette = 'onyx'

# --- MODULES ---

[os]
disabled = true
style = "bg:teal"
format = '[[ $symbol ](fg:background bg:teal)]($style)'
[os.symbols]
Macos = "󰀵"
Linux = "󰌽"
Windows = ""

[hostname]
ssh_only = false
style = "bg:teal"
format = '[[ $hostname ](fg:background bg:teal)]($style)'

[directory]
style = "fg:background bg:blue"
format = '[ $path ]($style)'
truncation_length = 3
truncation_symbol = "…/"
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:surface"
format = '[[ $symbol $branch ](fg:yellow bg:surface)]($style)'

[git_commit]
commit_hash_length = 7
style = "bg:surface"
format = '[[ $hash ](fg:yellow bg:surface)]($style)'

[git_status]
style = "bg:surface"
format = '[[($all_status$ahead_behind )](fg:yellow bg:surface)]($style)'

[python]
symbol = "󰌠 "
style = "bg:highlight"
format = '[[ $symbol ($version)(\($virtualenv\)) ](fg:cyan bg:highlight)]($style)'

[nodejs]
symbol = "󰎙 "
style = "bg:highlight"
format = '[[ $symbol ($version) ](fg:cyan bg:highlight)]($style)'

[c]
symbol = " "
style = "bg:highlight"
format = '[[ $symbol ($version) ](fg:cyan bg:highlight)]($style)'

[rust]
symbol = "󱘗 "
style = "bg:highlight"
format = '[[ $symbol ($version) ](fg:cyan bg:highlight)]($style)'

[golang]
symbol = "󰟓 "
style = "bg:highlight"
format = '[[ $symbol ($version) ](fg:cyan bg:highlight)]($style)'

[php]
