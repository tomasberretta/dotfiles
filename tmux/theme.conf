# Dark theme - Generated from centralized palette
# Background matches Ghostty/Neovim exactly: #191B20

# Theme colors from centralized palette (matches starship unified_dark)
thm_bg="#191B20"
thm_fg="#C0CAF5"
thm_surface="#515669"
thm_blue="#7AA2F7"
thm_green="#9ECE6A"
thm_pink="#D08770"
thm_purple="#9D7CD8"
thm_red="#BF616A"
thm_yellow="#E0AF68"
thm_orange="#FF9E64"
thm_cyan="#7DCFFF"
thm_gray="#21252D"
thm_highlight="#3A3D4A"

# Rounded separators for modern look
l_round=""
r_round=""

# Status bar configuration
set -g status on
set -g status-bg "$thm_bg"
set -g status-fg "$thm_fg"
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Window status styling
setw -g window-status-activity-style "fg=$thm_fg,bg=$thm_bg,none"
setw -g window-status-separator ""
setw -g window-status-style "fg=$thm_surface,bg=$thm_bg,none"

# Inactive window format - subtle gray
setw -g window-status-format "#[fg=$thm_surface,bg=$thm_bg] #I:#W  "

# Active window format - themed accent with rounded corners
setw -g window-status-current-format "#[fg=$thm_pink,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_pink,bold] #I:#W #[fg=$thm_pink,bg=$thm_bg]${r_round} "

# Left status: prefix indicator, zoom indicator, and session name
# Shows yellow indicator when prefix is pressed, red indicator when zoomed
set -g status-left "#{?client_prefix,#[fg=$thm_yellow]#[bg=$thm_bg]${l_round}#[fg=$thm_bg]#[bg=$thm_yellow]#[bold] ⌘ #[fg=$thm_yellow]#[bg=$thm_bg]${r_round} ,}#{?window_zoomed_flag,#[fg=$thm_red]#[bg=$thm_bg]${l_round}#[fg=$thm_bg]#[bg=$thm_red]#[bold] ⊙ #[fg=$thm_red]#[bg=$thm_bg]${r_round} ,}#[fg=$thm_purple,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_purple,bold] #S #[fg=$thm_purple,bg=$thm_bg]${r_round} "

# Right status: current path and current command with themed colors
set -g status-right "#[fg=$thm_blue,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_blue] #{b:pane_current_path} #[fg=$thm_blue,bg=$thm_bg]${r_round} #[fg=$thm_red,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_red] #{pane_current_command} #[fg=$thm_red,bg=$thm_bg]${r_round} "

# Message styling - blue text on highlight background
set -g message-style "fg=$thm_blue,bg=$thm_highlight,align=centre"
set -g message-command-style "fg=$thm_blue,bg=$thm_highlight,align=centre"

# Pane borders - themed active color for active, gray for inactive
set -g pane-border-style "fg=$thm_surface"
set -g pane-active-border-style "fg=$thm_pink"

# Copy mode styling
set -g mode-style "fg=$thm_fg,bg=$thm_highlight"
setw -g mode-style "fg=$thm_fg,bg=$thm_highlight"

# Clock styling
set -g clock-mode-colour "$thm_blue"
