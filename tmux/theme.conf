# Onyx theme - Generated from centralized palette
# Two-tone pill style: colored icon chip + neutral text section.

# Theme colors from centralized palette
thm_bg="#151311"
thm_fg="#eed3ba"
thm_gray="#a08d7d"
thm_border="#3a2e2a"
thm_blue="#9fbde0"
thm_green="#b8c47c"
thm_pink="#d48a9c"
thm_purple="#c28a9a"
thm_red="#e87462"
thm_yellow="#f0c97d"
thm_orange="#eda078"
thm_cyan="#a8c8c2"
thm_black="#0a0908"
thm_surface="#251e1b"
thm_highlight="#4b262f"

# Rounded pill caps (powerline glyphs)
l_round=""
r_round=""

# Nerd Font icons (FontAwesome basic set — guaranteed in every Nerd Font variant)
i_session=""
i_folder=""
i_term=""

# Status bar configuration
set -g status on
set -g status-bg "$thm_bg"
set -g status-fg "$thm_fg"
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Window status base styling
setw -g window-status-activity-style "fg=$thm_yellow,bg=$thm_bg,none"
setw -g window-status-separator ""
setw -g window-status-style "fg=$thm_gray,bg=$thm_bg,none"

# Inactive window: no pill, dim text
setw -g window-status-format "#[fg=$thm_gray,bg=$thm_bg] #I:#W "

# Active window: two-tone — colored index chip | border-bg name section
setw -g window-status-current-format "#[fg=$thm_pink,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_pink,bold]#I#[fg=$thm_pink,bg=$thm_border]${r_round}#[fg=$thm_fg,bg=$thm_border,bold] #W #[fg=$thm_border,bg=$thm_bg]${r_round} "

# Left status: prefix indicator, zoom indicator, and session pill
# Prefix (yellow) and zoom (red) stay single-tone — they're mode alerts
set -g status-left " #{?client_prefix,#[fg=$thm_yellow]#[bg=$thm_bg]${l_round}#[fg=$thm_bg]#[bg=$thm_yellow]#[bold]⌘#[fg=$thm_yellow]#[bg=$thm_bg]${r_round} ,}#{?window_zoomed_flag,#[fg=$thm_red]#[bg=$thm_bg]${l_round}#[fg=$thm_bg]#[bg=$thm_red]#[bold]⊙#[fg=$thm_red]#[bg=$thm_bg]${r_round} ,}#[fg=$thm_orange,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_orange,bold]${i_session}#[fg=$thm_orange,bg=$thm_surface]${r_round}#[fg=$thm_fg,bg=$thm_surface,nobold] #S #[fg=$thm_surface,bg=$thm_bg]${r_round} "

# Right status: two-tone path and command pills
set -g status-right "#[fg=$thm_green,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_green,bold]${i_folder}#[fg=$thm_green,bg=$thm_surface]${r_round}#[fg=$thm_fg,bg=$thm_surface,nobold] #{b:pane_current_path} #[fg=$thm_surface,bg=$thm_bg]${r_round} #[fg=$thm_yellow,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_yellow,bold]${i_term}#[fg=$thm_yellow,bg=$thm_surface]${r_round}#[fg=$thm_fg,bg=$thm_surface,nobold] #{pane_current_command} #[fg=$thm_surface,bg=$thm_bg]${r_round} "

# Message styling - blue text on surface background
set -g message-style "fg=$thm_blue,bg=$thm_surface,align=centre"
set -g message-command-style "fg=$thm_blue,bg=$thm_surface,align=centre"

# Pane borders
set -g pane-border-style "fg=$thm_border"
set -g pane-active-border-style "fg=$thm_border"
set -g pane-border-lines single
set -g pane-border-indicators off

# Copy mode styling
set -g mode-style "fg=$thm_fg,bg=$thm_border"
setw -g mode-style "fg=$thm_fg,bg=$thm_border"

# Clock styling
set -g clock-mode-colour "$thm_blue"
