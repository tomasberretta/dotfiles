# IntelliJ New UI Dark theme
# Background matches Ghostty/Neovim exactly: #1e1f22

# Theme colors (IntelliJ New UI Dark)
thm_bg="#1e1f22"
thm_fg="#bcbec4"
thm_surface="#2b2d30"
thm_blue="#56a8f5"
thm_green="#6aab73"
thm_teal="#c77dbb"
thm_purple="#c77dbb"
thm_red="#f75464"
thm_yellow="#f2c55c"
thm_orange="#cf8e6d"
thm_cyan="#2aacb8"
thm_gray="#2b2d30"
thm_highlight="#2d2f34"
thm_border="#393b40"

# Rounded separators for modern look
l_round="\ue0b6"
r_round="\ue0b4"

# Status bar configuration
set -g status on
set -g status-bg "$thm_bg"
set -g status-fg "$thm_fg"
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Window status styling
setw -g window-status-activity-style "fg=$thm_fg,bg=$thm_bg,none"
setw -g window-status-separator ""
setw -g window-status-style "fg=$thm_border,bg=$thm_bg,none"

# Inactive window format - subtle gray
setw -g window-status-format "#[fg=$thm_border,bg=$thm_bg] #I:#W  "

# Active window format - themed accent with rounded corners
setw -g window-status-current-format "#[fg=$thm_blue,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_blue,bold] #I:#W #[fg=$thm_blue,bg=$thm_bg]${r_round} "

# Left status: prefix indicator, zoom indicator, and session name
# Shows yellow indicator when prefix is pressed, red indicator when zoomed
set -g status-left " #{?client_prefix,#[fg=$thm_yellow]#[bg=$thm_bg]${l_round}#[fg=$thm_bg]#[bg=$thm_yellow]#[bold] ⌘ #[fg=$thm_yellow]#[bg=$thm_bg]${r_round} ,}#{?window_zoomed_flag,#[fg=$thm_red]#[bg=$thm_bg]${l_round}#[fg=$thm_bg]#[bg=$thm_red]#[bold] ⊙ #[fg=$thm_red]#[bg=$thm_bg]${r_round} ,}#[fg=$thm_orange,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_orange,bold] #S #[fg=$thm_orange,bg=$thm_bg]${r_round} "

# Right status: current path and current command with themed colors
set -g status-right "#[fg=$thm_green,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_green] #{b:pane_current_path} #[fg=$thm_green,bg=$thm_bg]${r_round} #[fg=$thm_cyan,bg=$thm_bg]${l_round}#[fg=$thm_bg,bg=$thm_cyan] #{pane_current_command} #[fg=$thm_cyan,bg=$thm_bg]${r_round} "

# Message styling
set -g message-style "fg=$thm_blue,bg=$thm_surface,align=centre"
set -g message-command-style "fg=$thm_blue,bg=$thm_surface,align=centre"

# Pane borders - thin IntelliJ-style separator
set -g pane-border-style "fg=$thm_border"
set -g pane-active-border-style "fg=$thm_border"
set -g pane-border-lines single
set -g pane-border-indicators off

# Copy mode styling
set -g mode-style "fg=$thm_fg,bg=$thm_highlight"
setw -g mode-style "fg=$thm_fg,bg=$thm_highlight"

# Clock styling
set -g clock-mode-colour "$thm_blue"
