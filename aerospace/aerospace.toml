# Reference: https://github.com/i3/i3/blob/next/etc/config

start-at-login = false
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = false

after-startup-command = [
	# JankyBorders has a built-in detection of already running process,
	# so it won't be run twice on AeroSpace restart
	'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0',
]

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Notify sketchybar when workspace changes (for per-monitor workspace display)
exec-on-workspace-change = [
	'/bin/bash',
	'-c',
	'sketchybar --trigger aerospace_workspace_change',
]

[mode.main.binding]
# Focus navigation (hyper - h/j/k/l)
cmd-alt-ctrl-shift-h = 'focus --boundaries-action wrap-around-the-workspace left'
cmd-alt-ctrl-shift-j = 'focus --boundaries-action wrap-around-the-workspace down'
cmd-alt-ctrl-shift-k = 'focus --boundaries-action wrap-around-the-workspace up'
cmd-alt-ctrl-shift-l = 'focus --boundaries-action wrap-around-the-workspace right'

# Workspace cycling
ctrl-left = 'workspace --wrap-around prev'
ctrl-right = 'workspace --wrap-around next'

# Fullscreen (hyper-f)
cmd-alt-ctrl-shift-f = 'fullscreen'

# Balance sizes (hyper-b)
cmd-alt-ctrl-shift-b = 'balance-sizes'

# Layout: accordion / tiles
alt-comma = 'layout h_accordion'
alt-slash = 'layout tiles horizontal vertical'

# Layout: floating / tiling toggle (hyper-space)
cmd-alt-ctrl-shift-space = 'layout floating tiling'

# Workspaces (hyper - 1/2/3/4/5/q/w/e/r)
cmd-alt-ctrl-shift-1 = 'workspace Browser'
cmd-alt-ctrl-shift-2 = 'workspace Terminal'
cmd-alt-ctrl-shift-3 = 'workspace Communication'
cmd-alt-ctrl-shift-4 = 'workspace Dev'
cmd-alt-ctrl-shift-5 = 'workspace Issues'
cmd-alt-ctrl-shift-q = 'workspace Misc'
cmd-alt-ctrl-shift-w = 'workspace Notes'
cmd-alt-ctrl-shift-e = 'workspace Meetings'
cmd-alt-ctrl-shift-r = 'workspace Temp'

# Move node to workspace
alt-shift-1 = 'move-node-to-workspace Terminal'
alt-shift-2 = 'move-node-to-workspace Browser'
alt-shift-3 = 'move-node-to-workspace Dev'
alt-shift-4 = 'move-node-to-workspace Communication'
alt-shift-5 = 'move-node-to-workspace Issues'
alt-shift-q = 'move-node-to-workspace Misc'
alt-shift-w = 'move-node-to-workspace Notes'
alt-shift-e = 'move-node-to-workspace Meetings'
alt-shift-r = 'move-node-to-workspace Temp'
cmd-alt-ctrl-shift-t = 'move-node-to-workspace Temp'

# Move workspace to monitor (meh - h/l)
alt-ctrl-shift-h = 'move-workspace-to-monitor prev'
alt-ctrl-shift-l = 'move-workspace-to-monitor next'

# Reload config and resize mode
alt-shift-c = 'reload-config'
alt-r = 'mode resize'

[gaps]
inner.horizontal = [{ monitor."built-in" = 20 }, 25]
inner.vertical = [{ monitor."built-in" = 20 }, 25]
outer.left = [{ monitor."built-in" = 20 }, 25]
outer.bottom = [{ monitor."built-in" = 20 }, 25]
# outer.top = [{ monitor."built-in" = 0 }, 25] # 0 for built-in, 25 for others
outer.top = [{ monitor."built-in" = 5 }, 15]    # 0 for built-in, 25 for others
outer.right = [{ monitor."built-in" = 20 }, 25]

[mode.resize.binding]
left = 'resize width -50'
up = 'resize height +50'
down = 'resize height -50'
right = 'resize width +50'
enter = 'mode main'
esc = 'mode main'

# Callbacks
